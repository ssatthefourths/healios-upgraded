name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  # ── Detect which parts of the repo changed ───────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'tsconfig*'
              - 'tailwind.config*'
              - 'postcss.config*'
              - '.nvmrc'
              - '.github/workflows/deploy.yml'
            worker:
              - 'worker-api/**'
              - '.github/workflows/deploy.yml'

  # ── Frontend → Cloudflare Pages ──────────────────────────────────
  deploy-pages:
    name: Deploy Frontend (Pages)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin npm to match the version that produced package-lock.json.
      # Node 20 ships with npm 10; the lockfile in repo is npm 11+ format.
      # Mismatch causes npm ci to report transitive optionalDependencies
      # (e.g. @esbuild/* platform binaries) as "Missing from lock file".
      - name: Pin npm 11 (matches lockfile version)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          VITE_CF_WORKER_URL: https://healios-api.ss-f01.workers.dev
          VITE_CLARITY_ID: vsma9av1yg

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f019b80d70e4abeb4f0c28087db7db16
          command: pages deploy dist --project-name=healios-upgraded --branch=main

  # ── Worker API → Cloudflare Workers ──────────────────────────────
  deploy-worker:
    name: Deploy Worker API
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f019b80d70e4abeb4f0c28087db7db16
          workingDirectory: worker-api
