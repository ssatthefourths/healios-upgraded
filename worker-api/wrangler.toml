name = "healios-api"
main = "src/index.ts"
compatibility_date = "2024-03-14"
account_id = "f019b80d70e4abeb4f0c28087db7db16"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "healios-db"
database_id = "c5dbb000-df94-4742-8844-fe7c1f195f71"

# KV Namespace for Sessions (REQUIRED for Login)
# 1. Run: npx wrangler kv:namespace create SESSIONS
# 2. Paste the generated ID below and uncomment lines below
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "PASTE_KV_ID_HERE"

# R2 Bucket for Assets
# 1. Run: npx wrangler r2 bucket create healios-assets
# 2. Uncomment lines below
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "healios-assets"

[vars]
ENVIRONMENT = "production"
# Secrets — set via wrangler CLI, never commit values:
#   wrangler secret put JWT_SECRET
#   wrangler secret put LOVABLE_API_KEY
