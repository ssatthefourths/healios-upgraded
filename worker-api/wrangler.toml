name = "healios-api"
main = "src/index.ts"
compatibility_date = "2024-03-14"
account_id = "f019b80d70e4abeb4f0c28087db7db16"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "healios-db"
database_id = "c5dbb000-df94-4742-8844-fe7c1f195f71"

# KV Namespace for Sessions (REQUIRED for Login)
[[kv_namespaces]]
binding = "SESSIONS"
id = "a36c2cd6a06c44e4acbbe8ce6c593a3f"

# R2 Bucket for Assets
# Before first deploy after uncommenting:
#   npx wrangler r2 bucket create healios-assets
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "healios-assets"

# Cloudflare Workers AI (wellness chatbot)
[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
# Optional: override the public URL used for uploaded assets (e.g. custom domain)
# ASSETS_PUBLIC_URL = "https://healios-assets.thehealios.com"
# Secrets — set via wrangler CLI, never commit values:
#   wrangler secret put JWT_SECRET
#   wrangler secret put STRIPE_KEY              ← Stripe secret key (sk_live_... or sk_test_...)
#   wrangler secret put STRIPE_WEBHOOK_SECRET   ← Signing secret from Stripe Webhooks dashboard
#   wrangler secret put RESEND_API_KEY          ← Resend API key for order confirmation emails
#   wrangler secret put IP_HASH_SECRET          ← Random 32+ char string; rotate yearly. See docs/SECURITY-IP.md

# Daily cron — prune expired IP hashes per the 30-day retention policy.
# See src/utils/client-ip.ts and docs/SECURITY-IP.md.
[triggers]
crons = ["0 3 * * *"]
